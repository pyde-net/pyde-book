name: deploy

# Builds the mdBook and pushes it to the S3 bucket fronted by CloudFront
# for book.pyde.network. Auto-runs on every push to `main`; can be fired
# manually via the workflow_dispatch button from the Actions tab.
#
# AWS is reached through OIDC — there are no long-lived access keys in
# this repo's secrets. See `docs/AWS_DEPLOYMENT.md` for the IAM role
# trust policy + the minimum scope the role needs.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    name: build + sync to s3 + invalidate cloudfront
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://book.pyde.network

    env:
      MDBOOK_VERSION: "0.4.40"

    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: install mdbook
        run: |
          mkdir -p "$HOME/bin"
          curl -sSL "https://github.com/rust-lang/mdBook/releases/download/v${MDBOOK_VERSION}/mdbook-v${MDBOOK_VERSION}-x86_64-unknown-linux-gnu.tar.gz" \
            | tar -xz -C "$HOME/bin"
          echo "$HOME/bin" >> "$GITHUB_PATH"

      - name: build
        run: mdbook build

      - name: configure aws credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: sync book/ → s3
        # mdBook emits a few asset categories with different cache
        # profiles: HTML pages should revalidate (book content changes
        # often pre-mainnet), while CSS / JS / fonts / images are
        # immutable in practice (mdBook fingerprints the build).
        run: |
          aws s3 sync book/ "s3://${{ vars.S3_BUCKET }}/" \
            --delete \
            --exclude "*.html" \
            --exclude "*.txt" \
            --cache-control "public, max-age=31536000, immutable"
          aws s3 sync book/ "s3://${{ vars.S3_BUCKET }}/" \
            --exclude "*" \
            --include "*.html" \
            --include "*.txt" \
            --cache-control "public, max-age=0, must-revalidate"

      - name: invalidate cloudfront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ vars.CLOUDFRONT_DISTRIBUTION_ID }}" \
            --paths "/*"
