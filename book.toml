[book]
authors = ["Pyde Network"]
language = "en"
src = "src"
title = "The Pyde Book"
description = "Comprehensive technical reference for the Pyde blockchain protocol"

[build]
build-dir = "book"

[output.html]
default-theme = "dark"
preferred-dark-theme = "ayu"
git-repository-url = "https://github.com/pyde-net/pyde-book"
additional-css = ["theme/pyde-brand.css"]
additional-js = ["theme/pyde-footer.js"]
