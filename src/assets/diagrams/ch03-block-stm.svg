<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, Roboto, sans-serif">
  <defs>
    <filter id="sh" x="-30%" y="-30%" width="160%" height="160%"><feDropShadow dx="0" dy="3" stdDeviation="7" flood-color="#000000" flood-opacity="0.08"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#b2b2ba"/></marker>
  </defs>
  <rect width="1200" height="620" fill="#ffffff"/>
  <text x="600" y="58" text-anchor="middle" font-size="30" font-weight="700" fill="#16161a">Block-STM parallel execution</text>
  <text x="600" y="92" text-anchor="middle" font-size="16" fill="#8a8a92">Every transaction runs optimistically in parallel; the result is bit-identical on every validator</text>

  <!-- row 1 arrows -->
  <g stroke="#cfcfd6" stroke-width="2.2">
    <line x1="270" y1="210" x2="308" y2="210" marker-end="url(#ar)"/>
    <line x1="560" y1="210" x2="598" y2="210" marker-end="url(#ar)"/>
    <line x1="850" y1="210" x2="888" y2="210" marker-end="url(#ar)"/>
  </g>
  <text x="289" y="193" text-anchor="middle" font-size="12" fill="#9a9aa2">declared (addr, slot) pairs</text>

  <!-- row 1 -->
  <g filter="url(#sh)"><rect x="20" y="160" width="250" height="100" rx="14" fill="#f6f6f7" stroke="#e4e4e8" stroke-width="1.5"/></g>
  <text x="145" y="203" text-anchor="middle" font-size="18" font-weight="650" fill="#16161a">Committed wave</text>
  <text x="145" y="227" text-anchor="middle" font-size="12.5" fill="#7a7a82">canonical order,</text>
  <text x="145" y="243" text-anchor="middle" font-size="12.5" fill="#7a7a82">tx_index 0..N</text>

  <g filter="url(#sh)"><rect x="310" y="160" width="250" height="100" rx="14" fill="#f6f6f7" stroke="#e4e4e8" stroke-width="1.5"/></g>
  <text x="435" y="203" text-anchor="middle" font-size="18" font-weight="650" fill="#16161a">Prefetch</text>
  <text x="435" y="227" text-anchor="middle" font-size="12.5" fill="#7a7a82">access lists warm the cache;</text>
  <text x="435" y="243" text-anchor="middle" font-size="12.5" fill="#7a7a82">a hint, never scheduling</text>

  <g filter="url(#sh)"><rect x="600" y="160" width="250" height="100" rx="14" fill="#16161a"/></g>
  <text x="725" y="203" text-anchor="middle" font-size="18" font-weight="650" fill="#ffffff">Execute in parallel</text>
  <text x="725" y="227" text-anchor="middle" font-size="12.5" fill="#b6b6be">every tx concurrently;</text>
  <text x="725" y="243" text-anchor="middle" font-size="12.5" fill="#b6b6be">writes buffered in MVCC</text>

  <g filter="url(#sh)"><rect x="890" y="160" width="250" height="100" rx="14" fill="#f6f6f7" stroke="#e4e4e8" stroke-width="1.5"/></g>
  <text x="1015" y="203" text-anchor="middle" font-size="18" font-weight="650" fill="#16161a">Validate</text>
  <text x="1015" y="227" text-anchor="middle" font-size="12.5" fill="#7a7a82">reads checked against</text>
  <text x="1015" y="243" text-anchor="middle" font-size="12.5" fill="#7a7a82">canonical tx_index order</text>

  <!-- conflict loop -->
  <path d="M1015,260 C1015,330 900,340 795,340" fill="none" stroke="#cfcfd6" stroke-width="2.2" marker-end="url(#ar)"/>
  <text x="960" y="318" text-anchor="middle" font-size="12" fill="#9a9aa2">conflict</text>
  <g filter="url(#sh)"><rect x="545" y="310" width="250" height="80" rx="14" fill="#f6f6f7" stroke="#e4e4e8" stroke-width="1.5"/></g>
  <text x="670" y="345" text-anchor="middle" font-size="17" font-weight="650" fill="#16161a">Re-incarnate</text>
  <text x="670" y="368" text-anchor="middle" font-size="12.5" fill="#7a7a82">old writes dropped; retries are free</text>
  <path d="M545,350 C480,350 460,300 600,240" fill="none" stroke="#cfcfd6" stroke-width="2.2" marker-end="url(#ar)"/>
  <text x="470" y="322" text-anchor="middle" font-size="12" fill="#9a9aa2">re-execute</text>

  <!-- finalize -->
  <path d="M1015,260 L1015,420 L940,455" fill="none" stroke="#cfcfd6" stroke-width="2.2" marker-end="url(#ar)"/>
  <text x="1065" y="400" text-anchor="middle" font-size="12" fill="#9a9aa2">validated; fixpoint</text>
  <text x="1065" y="416" text-anchor="middle" font-size="12" fill="#9a9aa2">in 1 to 2 passes</text>
  <g filter="url(#sh)"><rect x="690" y="430" width="250" height="80" rx="14" fill="#16161a"/></g>
  <text x="815" y="465" text-anchor="middle" font-size="17" font-weight="650" fill="#ffffff">Finalize</text>
  <text x="815" y="488" text-anchor="middle" font-size="12.5" fill="#b6b6be">bit-identical post-state root</text>

  <!-- callout -->
  <rect x="90" y="440" width="500" height="86" rx="15" fill="#fafafa" stroke="#ececf0" stroke-width="1.5"/>
  <text x="340" y="476" text-anchor="middle" font-size="15.5" font-weight="600" fill="#2a2a30">Block-STM owns scheduling and safety; the access</text>
  <text x="340" y="500" text-anchor="middle" font-size="15.5" font-weight="600" fill="#2a2a30">list owns warm-cache performance. A wrong list never fails a tx.</text>
</svg>
