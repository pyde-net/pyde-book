<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, Roboto, sans-serif">
  <defs>
    <filter id="sh" x="-30%" y="-30%" width="160%" height="160%"><feDropShadow dx="0" dy="3" stdDeviation="7" flood-color="#000000" flood-opacity="0.08"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#b2b2ba"/></marker>
  </defs>
  <rect width="1200" height="620" fill="#ffffff"/>
  <text x="600" y="58" text-anchor="middle" font-size="30" font-weight="700" fill="#16161a">The otigen developer loop</text>
  <text x="600" y="92" text-anchor="middle" font-size="16" fill="#8a8a92">One binary from scaffold to REPL; the author compiles, otigen verifies</text>

  <!-- row 1 arrows -->
  <g stroke="#cfcfd6" stroke-width="2.2">
    <line x1="360" y1="210" x2="418" y2="210" marker-end="url(#ar)"/>
    <line x1="760" y1="210" x2="818" y2="210" marker-end="url(#ar)"/>
  </g>
  <text x="389" y="193" text-anchor="middle" font-size="12" fill="#9a9aa2">author's native build</text>
  <text x="789" y="193" text-anchor="middle" font-size="12" fill="#9a9aa2">loads the bundle</text>

  <!-- row 1 -->
  <g filter="url(#sh)"><rect x="60" y="160" width="300" height="100" rx="14" fill="#f6f6f7" stroke="#e4e4e8" stroke-width="1.5"/></g>
  <text x="210" y="203" text-anchor="middle" font-size="18" font-weight="650" fill="#16161a">otigen init</text>
  <text x="210" y="227" text-anchor="middle" font-size="12.5" fill="#7a7a82">scaffold: otigen.toml + contract</text>
  <text x="210" y="243" text-anchor="middle" font-size="12.5" fill="#7a7a82">in Rust, AssemblyScript, Go, or C</text>

  <g filter="url(#sh)"><rect x="420" y="160" width="340" height="100" rx="14" fill="#f6f6f7" stroke="#e4e4e8" stroke-width="1.5"/></g>
  <text x="590" y="203" text-anchor="middle" font-size="18" font-weight="650" fill="#16161a">otigen build</text>
  <text x="590" y="227" text-anchor="middle" font-size="12.5" fill="#7a7a82">validate + package: pyde.abi section,</text>
  <text x="590" y="243" text-anchor="middle" font-size="12.5" fill="#7a7a82">bundle written</text>

  <g filter="url(#sh)"><rect x="820" y="160" width="320" height="100" rx="14" fill="#16161a"/></g>
  <text x="980" y="203" text-anchor="middle" font-size="18" font-weight="650" fill="#ffffff">otigen test</text>
  <text x="980" y="227" text-anchor="middle" font-size="12.5" fill="#b6b6be">behaviour tests through the same</text>
  <text x="980" y="243" text-anchor="middle" font-size="12.5" fill="#b6b6be">executor mainnet uses</text>

  <!-- wrap arrow -->
  <path d="M980,260 C980,330 400,310 262,378" fill="none" stroke="#cfcfd6" stroke-width="2.2" marker-end="url(#ar)"/>
  <text x="620" y="326" text-anchor="middle" font-size="12" fill="#9a9aa2">green: ship it</text>

  <!-- row 2 arrows -->
  <g stroke="#cfcfd6" stroke-width="2.2">
    <line x1="360" y1="435" x2="418" y2="435" marker-end="url(#ar)"/>
    <line x1="760" y1="435" x2="818" y2="435" marker-end="url(#ar)"/>
  </g>
  <text x="389" y="418" text-anchor="middle" font-size="12" fill="#9a9aa2">receipt polled</text>
  <text x="789" y="418" text-anchor="middle" font-size="12" fill="#9a9aa2">bytes match</text>

  <!-- row 2 -->
  <g filter="url(#sh)"><rect x="60" y="385" width="300" height="100" rx="14" fill="#f6f6f7" stroke="#e4e4e8" stroke-width="1.5"/></g>
  <text x="210" y="428" text-anchor="middle" font-size="18" font-weight="650" fill="#16161a">otigen deploy</text>
  <text x="210" y="452" text-anchor="middle" font-size="12.5" fill="#7a7a82">FALCON-sign the Poseidon2 tx</text>
  <text x="210" y="468" text-anchor="middle" font-size="12.5" fill="#7a7a82">hash, submit over JSON-RPC</text>

  <g filter="url(#sh)"><rect x="420" y="385" width="340" height="100" rx="14" fill="#f6f6f7" stroke="#e4e4e8" stroke-width="1.5"/></g>
  <text x="590" y="428" text-anchor="middle" font-size="18" font-weight="650" fill="#16161a">otigen verify</text>
  <text x="590" y="452" text-anchor="middle" font-size="12.5" fill="#7a7a82">local bundle bytes against the</text>
  <text x="590" y="468" text-anchor="middle" font-size="12.5" fill="#7a7a82">chain-stored contract code</text>

  <g filter="url(#sh)"><rect x="820" y="385" width="320" height="100" rx="14" fill="#f6f6f7" stroke="#e4e4e8" stroke-width="1.5"/></g>
  <text x="980" y="428" text-anchor="middle" font-size="18" font-weight="650" fill="#16161a">otigen console</text>
  <text x="980" y="452" text-anchor="middle" font-size="12.5" fill="#7a7a82">REPL: state, events, call, tx,</text>
  <text x="980" y="468" text-anchor="middle" font-size="12.5" fill="#7a7a82">balance in quanta and PYDE</text>

  <!-- callout -->
  <rect x="150" y="540" width="900" height="52" rx="15" fill="#fafafa" stroke="#ececf0" stroke-width="1.5"/>
  <text x="600" y="573" text-anchor="middle" font-size="16" font-weight="600" fill="#2a2a30">The toolchain never compiles your WASM: it validates it, tests it at chain fidelity, and proves the deployed bytes match.</text>
</svg>
