<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, Roboto, sans-serif">
  <defs>
    <filter id="sh" x="-30%" y="-30%" width="160%" height="160%"><feDropShadow dx="0" dy="3" stdDeviation="7" flood-color="#000000" flood-opacity="0.08"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#b2b2ba"/></marker>
  </defs>
  <rect width="1200" height="620" fill="#ffffff"/>
  <text x="600" y="58" text-anchor="middle" font-size="30" font-weight="700" fill="#16161a">From rounds to wave finality</text>
  <text x="600" y="92" text-anchor="middle" font-size="16" fill="#8a8a92">How each round's deterministic anchor turns DAG vertices into one certified wave</text>

  <!-- row 1 arrows -->
  <g stroke="#cfcfd6" stroke-width="2.2">
    <line x1="370" y1="210" x2="428" y2="210" marker-end="url(#ar)"/>
    <line x1="770" y1="210" x2="828" y2="210" marker-end="url(#ar)"/>
  </g>
  <text x="399" y="193" text-anchor="middle" font-size="12" fill="#9a9aa2">every round</text>
  <text x="799" y="193" text-anchor="middle" font-size="12" fill="#9a9aa2">commit fires on support</text>

  <!-- row 1 -->
  <g filter="url(#sh)"><rect x="70" y="160" width="300" height="100" rx="14" fill="#f6f6f7" stroke="#e4e4e8" stroke-width="1.5"/></g>
  <text x="220" y="203" text-anchor="middle" font-size="18" font-weight="650" fill="#16161a">Rounds</text>
  <text x="220" y="227" text-anchor="middle" font-size="12.5" fill="#7a7a82">one vertex per member per round</text>
  <text x="220" y="243" text-anchor="middle" font-size="12.5" fill="#7a7a82">(~150ms), DAG layers rising</text>

  <g filter="url(#sh)"><rect x="430" y="160" width="340" height="100" rx="14" fill="#f6f6f7" stroke="#e4e4e8" stroke-width="1.5"/></g>
  <text x="600" y="203" text-anchor="middle" font-size="18" font-weight="650" fill="#16161a">Anchor selected</text>
  <text x="600" y="227" text-anchor="middle" font-size="12.5" fill="#7a7a82">Hash(beacon, round, prev state root)</text>
  <text x="600" y="243" text-anchor="middle" font-size="12.5" fill="#7a7a82">mod 128: deterministic, unbiasable</text>

  <g filter="url(#sh)"><rect x="830" y="160" width="300" height="100" rx="14" fill="#f6f6f7" stroke="#e4e4e8" stroke-width="1.5"/></g>
  <text x="980" y="203" text-anchor="middle" font-size="18" font-weight="650" fill="#16161a">Subdag walk</text>
  <text x="980" y="227" text-anchor="middle" font-size="12.5" fill="#7a7a82">deterministic sort: round,</text>
  <text x="980" y="243" text-anchor="middle" font-size="12.5" fill="#7a7a82">member id, list order</text>

  <!-- wrap arrow -->
  <path d="M980,260 C980,330 400,310 272,378" fill="none" stroke="#cfcfd6" stroke-width="2.2" marker-end="url(#ar)"/>
  <text x="630" y="326" text-anchor="middle" font-size="12" fill="#9a9aa2">canonical order, batch refs dereferenced</text>

  <!-- row 2 arrows -->
  <g stroke="#cfcfd6" stroke-width="2.2">
    <line x1="370" y1="435" x2="428" y2="435" marker-end="url(#ar)"/>
    <line x1="770" y1="435" x2="828" y2="435" marker-end="url(#ar)"/>
  </g>
  <text x="399" y="418" text-anchor="middle" font-size="12" fill="#9a9aa2">sigs ride next vertices</text>
  <text x="799" y="418" text-anchor="middle" font-size="12" fill="#9a9aa2">same root, 85 times</text>

  <!-- row 2 -->
  <g filter="url(#sh)"><rect x="70" y="385" width="300" height="100" rx="14" fill="#f6f6f7" stroke="#e4e4e8" stroke-width="1.5"/></g>
  <text x="220" y="428" text-anchor="middle" font-size="18" font-weight="650" fill="#16161a">Execution</text>
  <text x="220" y="452" text-anchor="middle" font-size="12.5" fill="#7a7a82">wasmtime, canonical order;</text>
  <text x="220" y="468" text-anchor="middle" font-size="12.5" fill="#7a7a82">dual-hash state root</text>

  <g filter="url(#sh)"><rect x="430" y="385" width="340" height="100" rx="14" fill="#16161a"/></g>
  <text x="600" y="428" text-anchor="middle" font-size="18" font-weight="650" fill="#ffffff">Quorum certification</text>
  <text x="600" y="452" text-anchor="middle" font-size="12.5" fill="#b6b6be">at least 85 of 128 members</text>
  <text x="600" y="468" text-anchor="middle" font-size="12.5" fill="#b6b6be">FALCON-sign the state root</text>

  <g filter="url(#sh)"><rect x="830" y="385" width="300" height="100" rx="14" fill="#f6f6f7" stroke="#e4e4e8" stroke-width="1.5"/></g>
  <text x="980" y="428" text-anchor="middle" font-size="18" font-weight="650" fill="#16161a">Wave finality</text>
  <text x="980" y="452" text-anchor="middle" font-size="12.5" fill="#7a7a82">~500ms median,</text>
  <text x="980" y="468" text-anchor="middle" font-size="12.5" fill="#7a7a82">~1s p99</text>

  <!-- callout -->
  <rect x="150" y="540" width="900" height="52" rx="15" fill="#fafafa" stroke="#ececf0" stroke-width="1.5"/>
  <text x="600" y="573" text-anchor="middle" font-size="16" font-weight="600" fill="#2a2a30">One quorum everywhere: 85 of 128 (f = 42) gates certification, commit support, state roots, and the beacon alike.</text>
</svg>
