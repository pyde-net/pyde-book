<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, Roboto, sans-serif">
  <defs>
    <filter id="sh" x="-30%" y="-30%" width="160%" height="160%"><feDropShadow dx="0" dy="3" stdDeviation="7" flood-color="#000000" flood-opacity="0.08"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#b2b2ba"/></marker>
  </defs>
  <rect width="1200" height="620" fill="#ffffff"/>
  <text x="600" y="58" text-anchor="middle" font-size="30" font-weight="700" fill="#16161a">How a node catches up</text>
  <text x="600" y="92" text-anchor="middle" font-size="16" fill="#8a8a92">Snapshot sync: about 40 minutes on commodity hardware, every artifact verified before it is trusted</text>

  <!-- row 1 arrows -->
  <g stroke="#cfcfd6" stroke-width="2.2">
    <line x1="370" y1="210" x2="428" y2="210" marker-end="url(#ar)"/>
    <line x1="770" y1="210" x2="828" y2="210" marker-end="url(#ar)"/>
  </g>
  <text x="399" y="193" text-anchor="middle" font-size="12" fill="#9a9aa2">manifest found via peers</text>
  <text x="799" y="193" text-anchor="middle" font-size="12" fill="#9a9aa2">signatures verified</text>

  <!-- row 1 -->
  <g filter="url(#sh)"><rect x="70" y="160" width="300" height="100" rx="14" fill="#f6f6f7" stroke="#e4e4e8" stroke-width="1.5"/></g>
  <text x="220" y="203" text-anchor="middle" font-size="18" font-weight="650" fill="#16161a">Trust bootstrap</text>
  <text x="220" y="227" text-anchor="middle" font-size="12.5" fill="#7a7a82">genesis chain-of-trust or a</text>
  <text x="220" y="243" text-anchor="middle" font-size="12.5" fill="#7a7a82">weak-subjectivity checkpoint</text>

  <g filter="url(#sh)"><rect x="430" y="160" width="340" height="100" rx="14" fill="#f6f6f7" stroke="#e4e4e8" stroke-width="1.5"/></g>
  <text x="600" y="203" text-anchor="middle" font-size="18" font-weight="650" fill="#16161a">Verify the manifest</text>
  <text x="600" y="227" text-anchor="middle" font-size="12.5" fill="#7a7a82">~5 KB, carrying both roots;</text>
  <text x="600" y="243" text-anchor="middle" font-size="12.5" fill="#7a7a82">at least 85 FALCON signatures</text>

  <g filter="url(#sh)"><rect x="830" y="160" width="300" height="100" rx="14" fill="#f6f6f7" stroke="#e4e4e8" stroke-width="1.5"/></g>
  <text x="980" y="203" text-anchor="middle" font-size="18" font-weight="650" fill="#16161a">Download chunks</text>
  <text x="980" y="227" text-anchor="middle" font-size="12.5" fill="#7a7a82">parallel 4 MB chunks; a bad</text>
  <text x="980" y="243" text-anchor="middle" font-size="12.5" fill="#7a7a82">chunk bans the peer</text>

  <!-- wrap arrow -->
  <path d="M980,260 C980,330 400,310 272,378" fill="none" stroke="#cfcfd6" stroke-width="2.2" marker-end="url(#ar)"/>
  <text x="630" y="326" text-anchor="middle" font-size="12" fill="#9a9aa2">every chunk hash matches the manifest</text>

  <!-- row 2 arrows -->
  <g stroke="#cfcfd6" stroke-width="2.2">
    <line x1="370" y1="435" x2="428" y2="435" marker-end="url(#ar)"/>
    <line x1="770" y1="435" x2="828" y2="435" marker-end="url(#ar)"/>
  </g>
  <text x="399" y="418" text-anchor="middle" font-size="12" fill="#9a9aa2">roots match: accept</text>
  <text x="799" y="418" text-anchor="middle" font-size="12" fill="#9a9aa2">current state reached</text>

  <!-- row 2 -->
  <g filter="url(#sh)"><rect x="70" y="385" width="300" height="100" rx="14" fill="#f6f6f7" stroke="#e4e4e8" stroke-width="1.5"/></g>
  <text x="220" y="428" text-anchor="middle" font-size="18" font-weight="650" fill="#16161a">Reconstruct state</text>
  <text x="220" y="452" text-anchor="middle" font-size="12.5" fill="#7a7a82">rebuild the JMT, recompute the</text>
  <text x="220" y="468" text-anchor="middle" font-size="12.5" fill="#7a7a82">Blake3 root locally, compare</text>

  <g filter="url(#sh)"><rect x="430" y="385" width="340" height="100" rx="14" fill="#f6f6f7" stroke="#e4e4e8" stroke-width="1.5"/></g>
  <text x="600" y="428" text-anchor="middle" font-size="18" font-weight="650" fill="#16161a">Recent tail sync</text>
  <text x="600" y="452" text-anchor="middle" font-size="12.5" fill="#7a7a82">replay from the snapshot point</text>
  <text x="600" y="468" text-anchor="middle" font-size="12.5" fill="#7a7a82">to the live edge</text>

  <g filter="url(#sh)"><rect x="830" y="385" width="300" height="100" rx="14" fill="#16161a"/></g>
  <text x="980" y="428" text-anchor="middle" font-size="18" font-weight="650" fill="#ffffff">Active operation</text>
  <text x="980" y="452" text-anchor="middle" font-size="12.5" fill="#b6b6be">subscribed to gossip,</text>
  <text x="980" y="468" text-anchor="middle" font-size="12.5" fill="#b6b6be">participating</text>

  <!-- callout -->
  <rect x="150" y="540" width="900" height="52" rx="15" fill="#fafafa" stroke="#ececf0" stroke-width="1.5"/>
  <text x="600" y="573" text-anchor="middle" font-size="16" font-weight="600" fill="#2a2a30">Full replay is infeasible at chain scale; snapshot sync reaches verified current state in about 40 minutes.</text>
</svg>
