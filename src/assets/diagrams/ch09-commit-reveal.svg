<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="640" viewBox="0 0 1200 640" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, Roboto, sans-serif">
  <defs>
    <filter id="sh" x="-30%" y="-30%" width="160%" height="160%"><feDropShadow dx="0" dy="3" stdDeviation="7" flood-color="#000000" flood-opacity="0.08"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#b2b2ba"/></marker>
  </defs>
  <rect width="1200" height="640" fill="#ffffff"/>
  <text x="600" y="58" text-anchor="middle" font-size="30" font-weight="700" fill="#16161a">The keyless commit-reveal lane</text>
  <text x="600" y="92" text-anchor="middle" font-size="16" fill="#8a8a92">Order is locked before content is knowable, so front-running has nothing to read</text>

  <!-- main flow arrows -->
  <g stroke="#cfcfd6" stroke-width="2.2">
    <line x1="290" y1="215" x2="328" y2="215" marker-end="url(#ar)"/>
    <line x1="620" y1="215" x2="658" y2="215" marker-end="url(#ar)"/>
    <line x1="950" y1="215" x2="988" y2="215" marker-end="url(#ar)"/>
  </g>
  <text x="309" y="198" text-anchor="middle" font-size="12" fill="#9a9aa2">lands in the DAG</text>
  <text x="639" y="198" text-anchor="middle" font-size="12" fill="#9a9aa2">within 120 waves</text>
  <text x="969" y="198" text-anchor="middle" font-size="12" fill="#9a9aa2">hash matches</text>

  <!-- flow -->
  <g filter="url(#sh)"><rect x="20" y="160" width="270" height="110" rx="14" fill="#f6f6f7" stroke="#e4e4e8" stroke-width="1.5"/></g>
  <text x="155" y="200" text-anchor="middle" font-size="18" font-weight="650" fill="#16161a">Commit</text>
  <text x="155" y="224" text-anchor="middle" font-size="12.5" fill="#7a7a82">Blake3 commitment + ceiling;</text>
  <text x="155" y="240" text-anchor="middle" font-size="12.5" fill="#7a7a82">bond escrowed</text>

  <g filter="url(#sh)"><rect x="330" y="160" width="290" height="110" rx="14" fill="#16161a"/></g>
  <text x="475" y="200" text-anchor="middle" font-size="18" font-weight="650" fill="#ffffff">Order locked</text>
  <text x="475" y="224" text-anchor="middle" font-size="12.5" fill="#b6b6be">the DAG fixes its position;</text>
  <text x="475" y="240" text-anchor="middle" font-size="12.5" fill="#b6b6be">content unknown to everyone</text>

  <g filter="url(#sh)"><rect x="660" y="160" width="290" height="110" rx="14" fill="#f6f6f7" stroke="#e4e4e8" stroke-width="1.5"/></g>
  <text x="805" y="200" text-anchor="middle" font-size="18" font-weight="650" fill="#16161a">Reveal</text>
  <text x="805" y="224" text-anchor="middle" font-size="12.5" fill="#7a7a82">inner tx + nonce; expiry</text>
  <text x="805" y="240" text-anchor="middle" font-size="12.5" fill="#7a7a82">burns the bond</text>

  <g filter="url(#sh)"><rect x="990" y="160" width="190" height="110" rx="14" fill="#f6f6f7" stroke="#e4e4e8" stroke-width="1.5"/></g>
  <text x="1085" y="200" text-anchor="middle" font-size="18" font-weight="650" fill="#16161a">Execute</text>
  <text x="1085" y="224" text-anchor="middle" font-size="12.5" fill="#7a7a82">in commit order;</text>
  <text x="1085" y="240" text-anchor="middle" font-size="12.5" fill="#7a7a82">bond refunded</text>

  <!-- searcher view -->
  <line x1="155" y1="270" x2="155" y2="330" stroke="#cfcfd6" stroke-width="2.2" marker-end="url(#ar)"/>
  <text x="235" y="308" text-anchor="middle" font-size="12" fill="#9a9aa2">mempool scrape</text>
  <g filter="url(#sh)"><rect x="20" y="335" width="560" height="110" rx="14" fill="#ffffff" stroke="#b8b8c0" stroke-width="1.6" stroke-dasharray="6 4"/></g>
  <text x="300" y="374" text-anchor="middle" font-size="16.5" font-weight="650" fill="#16161a">What a searcher sees</text>
  <text x="300" y="399" text-anchor="middle" font-size="12.5" fill="#7a7a82">sender, commitment, value ceiling, bond</text>
  <text x="300" y="419" text-anchor="middle" font-size="12.5" fill="#7a7a82">hidden: target contract, direction, size, token pair</text>

  <!-- resolution note -->
  <g filter="url(#sh)"><rect x="660" y="335" width="520" height="110" rx="14" fill="#f6f6f7" stroke="#e4e4e8" stroke-width="1.5"/></g>
  <text x="920" y="374" text-anchor="middle" font-size="16.5" font-weight="650" fill="#16161a">Reveal-wave resolution</text>
  <text x="920" y="399" text-anchor="middle" font-size="12.5" fill="#7a7a82">inner txs sorted by commit order, never by reveal arrival;</text>
  <text x="920" y="419" text-anchor="middle" font-size="12.5" fill="#7a7a82">fee is gas used at base fee, no tips, no priority lanes</text>

  <!-- callout -->
  <rect x="120" y="545" width="960" height="60" rx="15" fill="#fafafa" stroke="#ececf0" stroke-width="1.5"/>
  <text x="600" y="576" text-anchor="middle" font-size="16" font-weight="600" fill="#2a2a30">No actor ever holds both powers at once: reading content and altering order</text>
  <text x="600" y="596" text-anchor="middle" font-size="13" fill="#7a7a82">they exist in phases that never overlap, so MEV becomes unexpressible</text>
</svg>
