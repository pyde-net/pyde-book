<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, Roboto, sans-serif">
  <defs>
    <filter id="s1" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="3" stdDeviation="7" flood-color="#000000" flood-opacity="0.08"/>
    </filter>
  </defs>
  <rect width="1200" height="700" fill="#ffffff"/>

  <text x="600" y="60" text-anchor="middle" font-size="30" font-weight="700" fill="#16161a">One off-chain layer, many jobs</text>
  <text x="600" y="95" text-anchor="middle" font-size="17" fill="#8a8a92">Pyde forwards a contract's request to the right parachain, then gets back a verified result</text>

  <!-- spokes -->
  <g stroke="#d3d3da" stroke-width="2">
    <line x1="600" y1="400" x2="600" y2="176"/>
    <line x1="600" y1="400" x2="812" y2="327"/>
    <line x1="600" y1="400" x2="726" y2="580"/>
    <line x1="600" y1="400" x2="474" y2="580"/>
    <line x1="600" y1="400" x2="388" y2="327"/>
  </g>

  <!-- center: Pyde -->
  <g filter="url(#s1)"><rect x="521" y="356" width="158" height="88" rx="16" fill="#16161a"/></g>
  <text x="600" y="396" text-anchor="middle" font-size="24" font-weight="700" fill="#ffffff">Pyde</text>
  <text x="600" y="420" text-anchor="middle" font-size="13.5" fill="#b6b6be">the base chain</text>

  <!-- nodes -->
  <g filter="url(#s1)"><rect x="512" y="133" width="176" height="64" rx="13" fill="#f6f6f7" stroke="#e4e4e8" stroke-width="1.5"/></g>
  <text x="600" y="162" text-anchor="middle" font-size="17" font-weight="600" fill="#16161a">Chain X adapter</text>
  <text x="600" y="181" text-anchor="middle" font-size="12.5" fill="#8a8a92">runs a light client</text>

  <g filter="url(#s1)"><rect x="724" y="295" width="176" height="64" rx="13" fill="#f6f6f7" stroke="#e4e4e8" stroke-width="1.5"/></g>
  <text x="812" y="332" text-anchor="middle" font-size="17" font-weight="600" fill="#16161a">Price feeds</text>

  <g filter="url(#s1)"><rect x="638" y="548" width="176" height="64" rx="13" fill="#f6f6f7" stroke="#e4e4e8" stroke-width="1.5"/></g>
  <text x="726" y="585" text-anchor="middle" font-size="17" font-weight="600" fill="#16161a">Weather &amp; events</text>

  <g filter="url(#s1)"><rect x="386" y="548" width="176" height="64" rx="13" fill="#f6f6f7" stroke="#e4e4e8" stroke-width="1.5"/></g>
  <text x="474" y="585" text-anchor="middle" font-size="17" font-weight="600" fill="#16161a">File &amp; API</text>

  <g filter="url(#s1)"><rect x="300" y="295" width="176" height="64" rx="13" fill="#f6f6f7" stroke="#e4e4e8" stroke-width="1.5"/></g>
  <text x="388" y="324" text-anchor="middle" font-size="17" font-weight="600" fill="#16161a">Chain Y adapter</text>
  <text x="388" y="343" text-anchor="middle" font-size="12.5" fill="#8a8a92">runs a light client</text>

  <text x="600" y="666" text-anchor="middle" font-size="14.5" fill="#9a9aa2">Each parachain is its own decentralized, staked network. Different parachains do different jobs.</text>
</svg>
