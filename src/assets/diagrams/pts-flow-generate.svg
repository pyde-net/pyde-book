<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="540" viewBox="0 0 1200 540" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, Roboto, sans-serif">
  <defs>
    <filter id="sh" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="3" stdDeviation="7" flood-color="#000000" flood-opacity="0.08"/>
    </filter>
    <marker id="arw" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#b2b2ba"/>
    </marker>
  </defs>

  <rect width="1200" height="540" fill="#ffffff"/>

  <text x="600" y="70" text-anchor="middle" font-size="31" font-weight="700" fill="#17171b">A token is a form, not a program</text>
  <text x="600" y="105" text-anchor="middle" font-size="17" fill="#8a8a92">One manifest in, one audited path, the same bytes out</text>

  <!-- arrows (drawn first, behind boxes) -->
  <line x1="250" y1="260" x2="356" y2="260" stroke="#c9c9d0" stroke-width="2.2" marker-end="url(#arw)"/>
  <line x1="566" y1="260" x2="672" y2="260" stroke="#c9c9d0" stroke-width="2.2" marker-end="url(#arw)"/>
  <line x1="882" y1="260" x2="988" y2="260" stroke="#c9c9d0" stroke-width="2.2" marker-end="url(#arw)"/>
  <text x="303" y="243" text-anchor="middle" font-size="13.5" fill="#9a9aa2">fill it out</text>
  <text x="619" y="243" text-anchor="middle" font-size="13.5" fill="#9a9aa2">generated</text>
  <text x="935" y="243" text-anchor="middle" font-size="13.5" fill="#9a9aa2">deployed</text>

  <!-- box 1: manifest -->
  <g filter="url(#sh)"><rect x="40" y="200" width="210" height="120" rx="16" fill="#f6f6f7" stroke="#e4e4e8" stroke-width="1.5"/></g>
  <text x="145" y="253" text-anchor="middle" font-size="23" font-weight="650" fill="#17171b">Manifest</text>
  <text x="145" y="283" text-anchor="middle" font-size="14.5" fill="#7a7a82">a short .toml form</text>

  <!-- box 2: otigen (emphasis) -->
  <g filter="url(#sh)"><rect x="356" y="200" width="210" height="120" rx="16" fill="#17171b"/></g>
  <text x="461" y="253" text-anchor="middle" font-size="23" font-weight="650" fill="#ffffff">otigen</text>
  <text x="461" y="283" text-anchor="middle" font-size="14.5" fill="#b6b6be">one audited generator</text>

  <!-- box 3: bytes -->
  <g filter="url(#sh)"><rect x="672" y="200" width="210" height="120" rx="16" fill="#f6f6f7" stroke="#e4e4e8" stroke-width="1.5"/></g>
  <text x="777" y="253" text-anchor="middle" font-size="22" font-weight="650" fill="#17171b">Identical bytes</text>
  <text x="777" y="283" text-anchor="middle" font-size="14.5" fill="#7a7a82">same in, same out</text>

  <!-- box 4: contract -->
  <g filter="url(#sh)"><rect x="988" y="200" width="210" height="120" rx="16" fill="#f6f6f7" stroke="#e4e4e8" stroke-width="1.5"/></g>
  <text x="1093" y="253" text-anchor="middle" font-size="23" font-weight="650" fill="#17171b">Contract</text>
  <text x="1093" y="283" text-anchor="middle" font-size="14.5" fill="#7a7a82">ordinary, on Pyde</text>

  <!-- callout -->
  <rect x="250" y="404" width="700" height="66" rx="15" fill="#fafafa" stroke="#ececf0" stroke-width="1.5"/>
  <text x="600" y="445" text-anchor="middle" font-size="20" font-weight="600" fill="#2a2a30">Nobody writes token code, so nobody can write a token bug.</text>
</svg>
